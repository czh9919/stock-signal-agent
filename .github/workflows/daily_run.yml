name: Daily Stock & Portfolio Analysis

on:
  schedule:
    # All times UTC. ET = UTC-4 (EDT) / UTC-5 (EST). Dublin = UTC+0/+1.
    - cron: '0 14 * * 1-5'   # 14:00 UTC → RUN_MODE=alert_check (09:00 ET pre-market)
    - cron: '30 21 * * 1-5'  # 21:30 UTC → RUN_MODE=full (16:30 ET after close)
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: portfolio | full | alert_check'
        required: false
        default: 'full'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install optional dependencies
        run: pip install vectorbt duckdb
        continue-on-error: true

      - name: Install CJK fonts (fixes Chinese labels in matplotlib charts)
        run: |
          sudo apt-get install -y fonts-wqy-microhei
          python -c "import matplotlib; import shutil; shutil.rmtree(matplotlib.get_cachedir(), ignore_errors=True)"

      # ── Persistent storage patch ──────────────────────────────────────────
      # GitHub Actions runners are ephemeral — no disk survives between runs.
      # We use actions/cache to persist:
      #   cache/              alert dedup, portfolio snapshots, FF5/SP500 caches
      #   data/stock_agent.db AI recommendation history + 30-day accuracy tracker
      #
      # Key strategy: unique key per run-id so every run writes a fresh entry;
      # restore-keys prefix matches the most recent prior run automatically.
      - name: Ensure persistent dirs exist
        run: mkdir -p cache data

      - name: Restore persistent cache
        uses: actions/cache@v4
        with:
          path: |
            cache/
            data/stock_agent.db
          key: persist-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            persist-${{ runner.os }}-

      - name: Resolve run mode from schedule time
        id: mode
        run: |
          INPUT_MODE="${{ github.event.inputs.run_mode }}"
          if [ -n "$INPUT_MODE" ]; then
            echo "run_mode=$INPUT_MODE" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "14" ]; then
              echo "run_mode=alert_check" >> $GITHUB_OUTPUT
            else
              echo "run_mode=full" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run agent
        env:
          RUN_MODE: ${{ steps.mode.outputs.run_mode }}
          # Broker APIs
          IBKR_FLEX_TOKEN:    ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_QUERY_ID:      ${{ secrets.IBKR_QUERY_ID }}
          T212_API_KEY:       ${{ secrets.T212_API_KEY }}
          T212_API_SECRET:    ${{ secrets.T212_API_SECRET }}
          ETORO_API_KEY:      ${{ secrets.ETORO_API_KEY }}
          # Email delivery (SMTP — primary)
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USER:          ${{ secrets.SMTP_USER }}
          SMTP_PASS:          ${{ secrets.SMTP_PASS }}
          REPORT_TO_EMAIL:    ${{ secrets.REPORT_TO_EMAIL }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
          # Email delivery (SendGrid — fallback)
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          # Optional data enrichment
          ALPHA_VANTAGE_KEY:  ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python main.py
