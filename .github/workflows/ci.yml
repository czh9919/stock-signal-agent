name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance ta anthropic APScheduler Jinja2 sendgrid \
            newsapi-python pandas numpy requests python-dotenv PyYAML

      - name: Syntax check
        run: |
          python -m py_compile \
            main.py scheduler.py \
            data/fetcher.py data/cleaner.py data/storage.py \
            strategy/indicators.py strategy/signals.py strategy/ai_analyst.py \
            backtest/historical.py backtest/tracker.py \
            notify/renderer.py notify/mailer.py
          echo "All files pass syntax check"
