ewma:
  lambda: 0.94          # RiskMetrics standard
  init_window: 21       # days to seed σ²₀

garch:
  omega: 0.000001
  alpha: 0.05
  beta:  0.94           # alpha + beta < 1 enforced

windows:
  fixed:        252     # historical sim, Sharpe, Beta, MaxDD
  correlation:   63     # rolling Pearson (≈ 1 quarter)
  monte_carlo:   63     # EWMA covariance for MC paths
  min_var:       21     # below this → skip holding from risk calcs
  stress:      2200     # long history (~8y) for historical crisis repricing

# Monte Carlo parameters live solely in config/settings.yaml (monte_carlo:
# n_paths / horizon / model) — do not duplicate them here to avoid drift.

risk_free_rate: 0.035   # 3.5% p.a. ECB rate (Ireland/Eurozone)
